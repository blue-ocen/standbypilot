name: Test and Deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Static smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify static prototype files
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f app.html
          test -f login.html
          test -f styles.css
          test -f route-details.css
          test -f outcome-tracker.css
          test -f app.js
          test -f app-core.js
          test -f paid-rescue.js
          test -f route-details.js
          test -f outcome-tracker.js
          test -f battle-card.js
          test -f test_trips_seed.json
          test -f supabase_schema.sql

          head -n 1 index.html | grep -F '<!doctype html>'
          grep -F 'Smarter non-rev route decisions.' index.html
          grep -F 'Enter your trip, add optional load notes, and get route risk with backup options in minutes.' index.html
          grep -F 'View Sample Route' index.html
          grep -F 'Trip Basics' app.html
          grep -F 'Route Brief' app.html
          grep -F 'href="./styles.css"' app.html
          grep -F 'src="./app.js"' app.html
          grep -F './battle-card.js' app.html
          grep -F 'paidRescuePreference' app.html
          grep -F 'airport-suggestions' app.html
          grep -F 'riskExplanation' app.html
          grep -F 'Route Intelligence' app.html
          grep -F 'intelligence-drawers' app.html
          grep -F 'Outcome Tracker' app.html
          grep -F 'outcomeTripSelect' app.html
          grep -F 'Recommendation usefulness' app.html
          grep -F "const AIRPORTS" app-core.js
          grep -F "code: 'SEA'" app-core.js
          grep -F "code: 'LIS'" app-core.js
          grep -F "code: 'NBO'" app-core.js
          grep -F 'Scope could not be detected. Choose domestic or international for better accuracy.' app-core.js
          grep -F 'Portugal alternatives' app-core.js
          grep -F 'Why this rating?' app-core.js
          grep -F 'Best Overall' app-core.js
          grep -F 'Load notes included. Recheck close to departure before relying on this route.' app-core.js
          grep -F "const PAID_RESCUE_SRC = './paid-rescue.js';" app.js
          grep -F "const ROUTE_DETAILS_SRC = './route-details.js';" app.js
          grep -F "const ROUTE_DETAILS_CSS = './route-details.css';" app.js
          grep -F "const OUTCOME_TRACKER_SRC = './outcome-tracker.js';" app.js
          grep -F "const OUTCOME_TRACKER_CSS = './outcome-tracker.css';" app.js
          grep -F 'Use non-rev for the expensive leg. Be willing to buy the final short segment if Plan A weakens.' paid-rescue.js
          grep -F 'Because this trip has a deadline, set a clear buy-confirmed trigger.' paid-rescue.js
          grep -F 'Paid rescue is off. Reduce risk by leaving earlier, using alternate airports, and avoiding last-flight dependencies.' paid-rescue.js
          grep -F 'Paid fallback allowed.' paid-rescue.js
          grep -F 'Paid rescue declined.' paid-rescue.js
          grep -F "paidRescuePreference: 'smart'" paid-rescue.js
          grep -F "paidRescuePreference: 'off'" paid-rescue.js
          grep -F "paidRescuePreference: 'deadline'" paid-rescue.js
          grep -F 'Risk factors' route-details.js
          grep -F 'Nearby airports' route-details.js
          grep -F 'Connection risk' route-details.js
          grep -F 'Load tracking notes' route-details.js
          grep -F 'Paid rescue logic' route-details.js
          grep -F 'Airline rule reminders' route-details.js
          grep -F 'Travel document reminders' route-details.js
          grep -F 'No nearby airport suggestions available yet.' route-details.js
          grep -F 'No load tracking added. Results are based on route, timing, flexibility, and trip type.' route-details.js
          grep -F 'Verify airline-specific non-rev, baggage, listing, and pass rider rules in your official airline tools.' route-details.js
          grep -F 'No international document reminder triggered.' route-details.js
          grep -F '.detail-drawer' route-details.css
          grep -F 'outcomeFields' outcome-tracker.js
          grep -F 'Average usefulness' outcome-tracker.js
          grep -F 'Completed outcomes' outcome-tracker.js
          grep -F 'Risk too low' outcome-tracker.js
          grep -F 'Risk accuracy' outcome-tracker.js
          grep -F 'Usefulness' outcome-tracker.js
          grep -F 'trip.outcome = readOutcomeForm();' outcome-tracker.js
          grep -F '.outcome-tracker-panel' outcome-tracker.css
          grep -F '.outcome-summary-card' outcome-tracker.css

          node --check app.js
          node --check app-core.js
          node --check paid-rescue.js
          node --check route-details.js
          node --check outcome-tracker.js
          node --check battle-card.js
          node -e "JSON.parse(require('fs').readFileSync('test_trips_seed.json', 'utf8'))"
          grep -Eiq 'create[[:space:]]+table' supabase_schema.sql

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
