name: Test and Deploy Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    name: Static smoke tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify static prototype files
        shell: bash
        run: |
          set -euo pipefail

          test -f index.html
          test -f styles.css
          test -f app.js
          test -f app-core.js
          test -f battle-card.js
          test -f test_trips_seed.json
          test -f supabase_schema.sql

          head -n 1 index.html | grep -F '<!doctype html>'
          grep -Eq 'href="\./styles\.css(\?[^"]*)?"' index.html
          grep -Eq 'src="\./app\.js(\?[^"]*)?"' index.html

          node --check app.js
          node --check app-core.js
          node --check battle-card.js
          node -e "JSON.parse(require('fs').readFileSync('test_trips_seed.json', 'utf8'))"
          grep -Eiq 'create[[:space:]]+table' supabase_schema.sql

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
